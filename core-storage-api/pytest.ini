[pytest]
asyncio_mode = auto
# All async fixtures + tests share one event loop for the whole session.
# The FastAPI app initialises its asyncpg engine on first import and binds
# it to the active loop; per-test loops then can't reuse the engine and
# raise "Event loop is closed" on every test after the first. Session
# scope keeps the engine usable across the whole run.
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
markers =
    integration: marks tests that require a running PostgreSQL instance
    asyncio: marks async tests
