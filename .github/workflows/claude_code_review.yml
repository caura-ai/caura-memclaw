# Claude Code Review
#
# Runs automatically when a PR is opened/reopened by a public member of
# the ``caura-ai`` organization. Re-trigger after pushing changes by
# commenting "@claude" on the PR (also restricted to org members).
#
# Why org-only: this workflow consumes ``ANTHROPIC_API_KEY`` and burns
# real budget per review. ``pull_request`` events from forks don't
# receive secrets anyway (GitHub strips them); restricting to org
# members makes the policy explicit and stops fork PRs from triggering
# silent-failure runs.
#
# The check uses ``author_association == 'MEMBER' | 'OWNER'``. Org
# members with PRIVATE membership show as ``NONE`` and will be
# skipped — they need to make their org membership public to use
# the bot.

name: Claude Code Review

on:
  pull_request:
    branches: [main, dev]
    types: [opened, reopened, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

env:
  EXTRA_PROMPT: "This is a FastAPI + PostgreSQL (pgvector) backend with a TypeScript OpenClaw plugin. Uses requirements.txt (not uv/pyproject.toml). Tests are in tests/ directory."
  REVIEW_PROMPT: |
    Do NOT review files under tests/ or test_* files. Focus only on source code.

    Review this PR for real issues only — not style preferences.

    ## Format

    For each issue:

    ### Issue Title
    **Severity**: Critical/High/Medium/Low
    **File**: `path/to/file.py:line-range`
    **Problem**: One sentence.

    <details>
    <summary>🤖 Claude Code Prompt</summary>

    ```
    [Self-contained prompt with exact file paths, line numbers, what to change and why]
    ```

    </details>

    ---

    ## Sections
    1. **Summary**: 2-3 sentences
    2. **Critical/High Issues**: Must fix before merge
    3. **Medium/Low Issues**: Should fix, not blocking
    4. **Suggestions**: Nice-to-have
    Skip empty sections.

    ## 🚀 Fix All Prompts
    At the end, add one "Fix All" code block per severity level that has issues (🔴 Critical, 🟠 High, 🟡 Medium/Low, 🟢 Suggestions). Each block combines all prompts from that level.

jobs:
  pre-checks:
    # Gate pre-checks on org membership too — otherwise the
    # "Log skip reason" step posts a misleading
    # ``Claude Code Review — skipped: ...`` comment on
    # non-org-member PRs that the review was never going to
    # run for anyway.
    if: >-
      github.event_name == 'pull_request'
      && (github.event.pull_request.author_association == 'MEMBER'
          || github.event.pull_request.author_association == 'OWNER')
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.decide.outputs.skip }}
      reason: ${{ steps.decide.outputs.reason }}
    steps:
      - name: Evaluate skip conditions
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
          MAX_FILES: "30"
          PR_ACTION: ${{ github.event.action }}
          PR_DRAFT: ${{ github.event.pull_request.draft }}
          PR_ACTOR: ${{ github.actor }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}

          # 1. Skip synchronize events (push to PR branch) — use @claude to re-trigger
          if [[ "$PR_ACTION" == "synchronize" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "reason=push to PR branch (synchronize) — comment @claude to re-trigger" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 2. Skip draft PRs
          if [[ "$PR_DRAFT" == "true" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "reason=draft PR" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 3. Skip bot PRs
          if [[ "$PR_ACTOR" == "dependabot[bot]" || "$PR_ACTOR" == "renovate[bot]" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "reason=bot PR ($PR_ACTOR)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 4. Too many changed files
          FILE_COUNT=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/files" --jq 'length')
          if [[ "$FILE_COUNT" -gt "$MAX_FILES" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "reason=PR has ${FILE_COUNT} files (limit: ${MAX_FILES})" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 5. Only test/config/docs files changed — no source to review
          SRC_FILES=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/files" \
            --jq '[.[] | select(.filename | (startswith("tests/") or startswith("test_") or test("^(Dockerfile|helm/|docs/|.*\\.(md|toml|lock|ya?ml)$)")) | not)] | length')
          if [[ "$SRC_FILES" -eq 0 ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "reason=no source files to review (only tests/docs/config)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "reason=" >> "$GITHUB_OUTPUT"

      - name: Log skip reason
        if: steps.decide.outputs.skip == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REASON: ${{ steps.decide.outputs.reason }}
        run: |
          echo "::notice::Skipping Claude review — $REASON"
          PR_NUMBER=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}
          gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            -f body="**Claude Code Review** — skipped: ${REASON}" 2>/dev/null || true

  # Runs on PR opened/reopened via claude-code-action (review mode).
  # Gated on org membership transitively through ``pre-checks``: when
  # ``pre-checks`` skips a non-member PR, ``needs.pre-checks.result``
  # is ``'skipped'`` (not ``'success'``), so the ``== 'success'`` clause
  # below already short-circuits this job. Don't re-check
  # ``author_association`` here — keeping the gate in one place avoids
  # the two conditions drifting out of sync.
  claude-review:
    needs: pre-checks
    if: >-
      github.event_name == 'pull_request'
      && needs.pre-checks.result == 'success'
      && needs.pre-checks.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          claude_args: "--model claude-sonnet-4-6"
          trigger_phrase: "@claude"
          assignee_trigger: "claude"
          use_sticky_comment: true
          show_full_output: true
          prompt: |
            ${{ env.EXTRA_PROMPT }}
            ${{ env.REVIEW_PROMPT }}

      - name: Post confirmation if no comment was left
        if: always() && steps.claude-review.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          BOT_COMMENTS=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq '[.[] | select(.user.login == "github-actions[bot]" and (.body | contains("Claude Code Review")))] | length')

          if [[ "$BOT_COMMENTS" -eq 0 ]]; then
            gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
              -f body="**Claude Code Review** :white_check_mark: No issues found."
          fi

      - name: Log review cost
        if: always() && steps.claude-review.outputs.execution_file
        shell: bash
        run: |
          EXEC_FILE="${{ steps.claude-review.outputs.execution_file }}"
          if [ -f "$EXEC_FILE" ]; then
            RESULT=$(jq '.[] | select(.type == "result")' "$EXEC_FILE" 2>/dev/null || true)
            if [ -n "$RESULT" ]; then
              COST=$(echo "$RESULT" | jq -r '.total_cost_usd // empty')
              TURNS=$(echo "$RESULT" | jq -r '.num_turns // empty')
              DURATION=$(echo "$RESULT" | jq -r '.duration_ms // empty')
              if [ -n "$COST" ]; then
                DURATION_SEC=$(echo "scale=1; ${DURATION:-0} / 1000" | bc 2>/dev/null || echo "?")
                echo "### Claude Code Review Cost" >> "$GITHUB_STEP_SUMMARY"
                echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
                echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
                echo "| Cost | \$${COST} |" >> "$GITHUB_STEP_SUMMARY"
                echo "| Turns | ${TURNS:-?} |" >> "$GITHUB_STEP_SUMMARY"
                echo "| Duration | ${DURATION_SEC}s |" >> "$GITHUB_STEP_SUMMARY"
              fi
            fi
          fi

  # Runs on @claude comment — only for public org members (MEMBER or OWNER).
  claude-retrigger:
    if: >-
      github.event_name == 'issue_comment'
      && contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Check commenter is org member
        id: auth
        env:
          AUTHOR_ASSOC: ${{ github.event.comment.author_association }}
          COMMENTER: ${{ github.event.comment.user.login }}
        run: |
          # ``author_association`` is set by GitHub on the event payload
          # and reflects the commenter's relationship to the repo's
          # owner organization. ``MEMBER`` = public org member,
          # ``OWNER`` = org owner. PRIVATE org members surface as
          # ``NONE`` — see header comment for the workaround.
          #
          # ``COLLABORATOR`` (non-org members granted direct repo write
          # access via Settings → Collaborators) is INTENTIONALLY
          # excluded — the policy is "members of our org only", which
          # is stricter than the previous ``write``/``admin`` permission
          # check. If a future operator wants to widen this, do it
          # explicitly; do not "fix" it back as a presumed bug.
          case "$AUTHOR_ASSOC" in
            MEMBER|OWNER)
              echo "authorized=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "authorized=false" >> "$GITHUB_OUTPUT"
              echo "::notice::@claude triggered by ${COMMENTER} (author_association: ${AUTHOR_ASSOC}) — skipping, org membership required"
              ;;
          esac

      - name: Get PR details
        if: steps.auth.outputs.authorized == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER=${{ github.event.issue.number }}
          REPO=${{ github.repository }}

          # Verify this is a PR comment, not an issue comment
          HTTP_CODE=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq '.number' 2>/dev/null) || {
            echo "Not a PR comment, skipping"
            echo "is_pr=false" >> "$GITHUB_OUTPUT"
            exit 0
          }

          HEAD_REF=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq '.head.ref')
          echo "is_pr=true" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"

      - name: Checkout PR branch
        if: steps.auth.outputs.authorized == 'true' && steps.pr.outputs.is_pr == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 1

      - name: Install Claude CLI
        if: steps.auth.outputs.authorized == 'true' && steps.pr.outputs.is_pr == 'true'
        run: npm install -g @anthropic-ai/claude-code@latest

      - name: Run review and post comment
        if: steps.auth.outputs.authorized == 'true' && steps.pr.outputs.is_pr == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        shell: bash
        run: |
          set -euo pipefail
          REPO=${{ github.repository }}

          # Build the full prompt
          PROMPT="${EXTRA_PROMPT}
          ${REVIEW_PROMPT}

          Review the PR diff provided on stdin."

          # Get the PR diff
          DIFF=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" \
            -H "Accept: application/vnd.github.diff")

          # Run Claude in print mode with JSON output to capture cost
          RESULT=$(echo "$DIFF" | claude --print --model claude-sonnet-4-6 \
            --output-format json \
            "$PROMPT" 2>&1) || {
            echo "ERROR: Claude CLI failed. Output:"
            echo "$RESULT"
            gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
              -f body="⚠️ Claude Code review failed (check workflow logs for details)"
            exit 1
          }

          # Extract review text and post as PR comment
          REVIEW=$(echo "$RESULT" | jq -r '.result // empty')
          if [ -z "$REVIEW" ]; then
            echo "ERROR: Could not extract review text from Claude output. Raw result:"
            echo "$RESULT"
            gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
              -f body="⚠️ Claude Code review failed: could not extract review text from response"
            exit 1
          fi
          gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            -f body="$REVIEW"

          # Log cost to job summary
          COST=$(echo "$RESULT" | jq -r '.total_cost_usd // empty')
          DURATION=$(echo "$RESULT" | jq -r '.duration_ms // empty')
          TOKENS_IN=$(echo "$RESULT" | jq -r '.usage.input_tokens // empty')
          TOKENS_OUT=$(echo "$RESULT" | jq -r '.usage.output_tokens // empty')
          if [ -n "$COST" ]; then
            DURATION_SEC=$(echo "scale=1; ${DURATION:-0} / 1000" | bc 2>/dev/null || echo "?")
            echo "### Claude Code Review Cost" >> "$GITHUB_STEP_SUMMARY"
            echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
            echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| Cost | \$${COST} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Input tokens | ${TOKENS_IN:-?} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Output tokens | ${TOKENS_OUT:-?} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Duration | ${DURATION_SEC}s |" >> "$GITHUB_STEP_SUMMARY"
          fi
